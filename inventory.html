<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowen — 庫存管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#7B5E3A;--brand-light:#F5EFE6;--brand-mid:#C4A882;--bg:#F7F5F2;--bg2:#fff;--bg3:#EFECE8;--border:#E3DDD3;--border2:#D0C8BC;--text:#2B2520;--text2:#6B6158;--text3:#9C8F84;--green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--amber:#d97706;--amber-bg:#fef3c7;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--brand);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav-logo{font-size:15px;font-weight:700}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 12px;border-radius:6px;color:rgba(255,255,255,.8);font-size:13px;text-decoration:none}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600}
.page{max-width:1200px;margin:0 auto;padding:20px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.sum-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.sum-val{font-size:24px;font-weight:700}
.sum-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sum-card.alert .sum-val{color:var(--red)}
.sum-card.ok .sum-val{color:var(--green)}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.search-box{flex:1;min-width:160px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg2);color:var(--text)}
.search-box:focus{outline:none;border-color:var(--brand-mid)}
.filter-select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg2);color:var(--text);cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{opacity:.88}
.btn-primary{background:var(--brand);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg3)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-hd{display:grid;grid-template-columns:1.2fr 2.2fr 1fr .8fr .8fr .8fr 1fr;gap:0;padding:8px 16px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--bg3)}
.table-row{display:grid;grid-template-columns:1.2fr 2.2fr 1fr .8fr .8fr .8fr 1fr;gap:0;padding:10px 16px;border-bottom:1px solid var(--border);align-items:center}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--bg3)}
.sku-tag{font-weight:700;color:var(--brand);font-size:12px}
.cat-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.cat-PATIO{background:#e0f2fe;color:#075985}
.cat-GLASS{background:#f0fdf4;color:#166534}
.cat-GUTTERS{background:#fef9c3;color:#854d0e}
.cat-HARDWARE{background:#fce7f3;color:#9d174d}
.cat-SEALANTS{background:#f3e8ff;color:#6b21a8}
.stock-ok{color:var(--green)}
.stock-low{color:var(--amber)}
.stock-zero{color:var(--red)}
.stock-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:8px}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-low{background:var(--amber-bg);color:var(--amber)}
.badge-zero{background:var(--red-bg);color:var(--red)}
.action-btns{display:flex;gap:4px}
.act-btn{padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text)}
.act-btn.in{color:var(--green);border-color:var(--green)}
.act-btn.in:hover{background:var(--green-bg)}
.act-btn.out{color:var(--red);border-color:var(--red)}
.act-btn.out:hover{background:var(--red-bg)}
.empty-row{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius);padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-md);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:var(--bg2)}
.form-input:focus{outline:none;border-color:var(--brand-mid)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.history-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-top:16px;overflow:hidden}
.history-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.hist-hd-row{display:grid;grid-template-columns:.8fr 1.2fr 1.8fr .6fr .7fr .7fr 1.2fr;gap:0;padding:8px 16px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--bg3)}
.hist-row{display:grid;grid-template-columns:.8fr 1.2fr 1.8fr .6fr .7fr .7fr 1.2fr;gap:0;padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.hist-row:last-child{border-bottom:none}
.in-tag{color:var(--green);font-weight:700}
.out-tag{color:var(--red);font-weight:700}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;width:fit-content}
.tab-btn{padding:7px 16px;border-radius:5px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500}
.tab-btn.active{background:var(--brand);color:#fff}
.sku-dd-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;max-height:200px;overflow-y:auto;background:var(--bg2);box-shadow:var(--shadow-md)}
.sku-dd-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.sku-dd-item:last-child{border-bottom:none}
.sku-dd-item:hover{background:var(--brand-light)}
@media(max-width:760px){
  .summary-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .table-hd{display:none}
  .table-row{grid-template-columns:1fr;gap:6px;padding:12px 14px}
  .hist-hd-row{display:none}
  .hist-row{grid-template-columns:1fr 1fr;font-size:11px}
  .toolbar-left{flex-direction:column}
}
</style>
</head>
<body>
<nav class="topnav">
  <div class="nav-logo">📦 Bowen 業務系統</div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🧮 貨櫃計劃</a>
    <a class="nav-link active" href="inventory.html">📊 庫存管理</a>
    <a class="nav-link" href="quote.html">💰 報價</a>
    <a class="nav-link" href="inventory.html#settings" onclick="switchToSettings()">⚙️ 產品設定</a>
  </div>
</nav>
<div class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div>
      <h1 style="font-size:20px;font-weight:700">庫存管理</h1>
      <p style="font-size:12px;color:var(--text3);margin-top:2px">Bowen Aluminum — 131個SKU · 5個類別</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" onclick="openModal('in')">＋ 入庫 IN</button>
      <button class="btn btn-red" onclick="openModal('out')">－ 出庫 OUT</button>
    </div>
  </div>
  <div class="summary-grid" id="summary-grid"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-inv" onclick="switchTab('inv')">📦 庫存總覽</button>
    <button class="tab-btn" id="tab-hist" onclick="switchTab('hist')">📋 異動記錄</button>
  </div>
  <div id="view-inv">
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-box" id="search-box" placeholder="搜尋 SKU 或產品名稱…" oninput="renderTable()">
        <select class="filter-select" id="cat-filter" onchange="renderTable()">
          <option value="">所有類別</option>
          <option value="PATIO COVER PROFILES">Patio Cover 型材</option>
          <option value="GLASS">玻璃</option>
          <option value="GUTTERS & DRAINAGE">排水配件</option>
          <option value="HARDWARE & FASTENERS">五金螺絲</option>
          <option value="SEALANTS & ADHESIVES">密封膠</option>
        </select>
        <select class="filter-select" id="stock-filter" onchange="renderTable()">
          <option value="">所有狀態</option>
          <option value="zero">🔴 缺貨</option>
          <option value="low">⚠️ 偏低</option>
          <option value="ok">✅ 正常</option>
        </select>
      </div>
      <button class="btn btn-outline" onclick="exportCSV()">⬇ 匯出CSV</button>
    </div>
    <div class="table-wrap">
      <div class="table-hd"><span>SKU</span><span>產品名稱</span><span>類別</span><span>庫存</span><span>最低量</span><span>狀態</span><span>操作</span></div>
      <div id="table-body"></div>
    </div>
  </div>
  <div id="view-hist" style="display:none">
    <div class="history-panel">
      <div class="history-hd">
        <span style="font-size:14px;font-weight:600">異動記錄</span>
        <button class="btn btn-outline" onclick="clearHistory()" style="font-size:12px;padding:5px 10px">清除記錄</button>
      </div>
      <div class="hist-hd-row"><span>日期</span><span>時間</span><span>SKU / 產品</span><span>類型</span><span>數量</span><span>庫存後</span><span>備注</span></div>
      <div id="history-body"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">＋ 入庫 (IN)</div>
    <div id="modal-product-info" style="margin-bottom:12px"></div>
    <div class="form-group">
      <label class="form-label">選擇產品 SKU</label>
      <input class="form-input" id="modal-sku-input" placeholder="輸入SKU或中文名稱搜尋…"
        oninput="filterModalSku(this.value)"
        onfocus="showModalDd()"
        onblur="setTimeout(hideModalDd,200)"
        onclick="showModalDd()">
      <div id="modal-dd" style="margin-top:4px"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">數量</label>
        <input class="form-input" id="modal-qty" type="number" min="1" value="1">
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" id="modal-date" type="date">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備注 (QB Ref# / 工地 / 說明)</label>
      <input class="form-input" id="modal-note" placeholder="例如: QB#1234 / 客戶名稱">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-green" id="modal-confirm" onclick="confirmTx()">確認入庫</button>
    </div>
  </div>
</div>

function invEdit(i,f,v){const l=JSON.parse(JSON.stringify(getProducts()));l[i][f]=f==='min_stock'?(+v||0):v;if(f==='name_zh')l[i].name_en=v;saveProds(l);renderSummary();renderTable();}
function invAdd(){const l=JSON.parse(JSON.stringify(getProducts()));l.push({id:'NEW',sku:'NEW-SKU',base_sku:'NEW',name_zh:'新產品',name_en:'New Product',category:'HARDWARE & FASTENERS',unit:'pcs',size_ft:null,stock:0,min_stock:10});saveProds(l);renderInvSettings();}
function invDel(i){if(!confirm('確定刪除？'))return;const l=JSON.parse(JSON.stringify(getProducts()));l.splice(i,1);saveProds(l);renderSummary();renderTable();renderInvSettings();}
function invReset(){if(!confirm('確定還原預設？'))return;resetProds();renderSummary();renderTable();renderInvSettings();}
function invExport(){
  const l=getProducts();
  const rows=[['SKU','中文名稱','英文名稱','類別','最低庫存']];
  l.forEach(p=>rows.push([p.sku,p.name_zh||'',p.name_en||'',p.category||'',p.min_stock||5]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='bowen_inv_products_'+new Date().toLocaleDateString('en-CA')+'.csv';a.click();
}
function invImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n').filter(l=>l.trim());
    const products=[];let skipped=0;
    lines.forEach((line,idx)=>{
      const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,'').trim());
      if(idx===0&&cols[0].toLowerCase().includes('sku'))return;
      const[sku,name_zh,name_en,category,min_stock]=cols;
      if(!sku){skipped++;return;}
      products.push({id:sku,sku,base_sku:sku.split('-')[0],name_zh:name_zh||sku,name_en:name_en||sku,category:category||'HARDWARE & FASTENERS',unit:'pcs',size_ft:null,stock:0,min_stock:parseInt(min_stock)||5});
    });
    if(!products.length){alert('匯入失敗：找不到有效資料');return;}
    if(!confirm(`匯入 ${products.length} 個產品？這將取代現有列表。`))return;
    saveProds(products);renderSummary();renderTable();renderInvSettings();
    alert(`✅ 成功匯入 ${products.length} 個產品！`);input.value='';
  };
  reader.readAsText(file,'UTF-8');
}


function renderSummary(){
  const total=getProducts().length,zero=getProducts().filter(p=>getStock(p.sku)===0).length;
  const low=getProducts().filter(p=>{const s=getStock(p.sku);return s>0&&s<=getMin(p.sku);}).length;
  const totalUnits=getProducts().reduce((a,p)=>a+getStock(p.sku),0);
  document.getElementById('summary-grid').innerHTML=`
    <div class="sum-card"><div class="sum-label">總產品數</div><div class="sum-val">${total}</div><div class="sum-sub">131個SKU · 5類別</div></div>
    <div class="sum-card ok"><div class="sum-label">庫存正常</div><div class="sum-val">${total-zero-low}</div><div class="sum-sub">超過最低庫存量</div></div>
    <div class="sum-card alert"><div class="sum-label">低庫存/缺貨</div><div class="sum-val">${low+zero}</div><div class="sum-sub">${zero}缺貨 · ${low}偏低</div></div>
    <div class="sum-card"><div class="sum-label">總庫存件數</div><div class="sum-val">${totalUnits.toLocaleString()}</div><div class="sum-sub">所有SKU合計</div></div>`;
}

function catBadge(cat){
  const m={'PATIO COVER PROFILES':'cat-PATIO 型材','GLASS':'cat-GLASS 玻璃','GUTTERS & DRAINAGE':'cat-GUTTERS 排水','HARDWARE & FASTENERS':'cat-HARDWARE 五金','SEALANTS & ADHESIVES':'cat-SEALANTS 密封膠'};
  const v=m[cat]||cat; const cls=v.split(' ')[0]; const lbl=v.split(' ').slice(1).join(' ');
  return `<span class="cat-badge ${cls}">${lbl}</span>`;
}

function renderTable(){
  const q=document.getElementById('search-box').value.toLowerCase();
  const cat=document.getElementById('cat-filter').value;
  const sf=document.getElementById('stock-filter').value;
  const filtered=getProducts().filter(p=>{
    if(q&&!p.sku.toLowerCase().includes(q)&&!p.name_zh.toLowerCase().includes(q)&&!p.name_en.toLowerCase().includes(q))return false;
    if(cat&&p.category!==cat)return false;
    if(sf){const st=getStatus(p.sku);if(st!==sf)return false;}
    return true;
  });
  if(!filtered.length){document.getElementById('table-body').innerHTML='<div class="empty-row">沒有符合的產品</div>';return;}
  document.getElementById('table-body').innerHTML=filtered.map(p=>{
    const s=getStock(p.sku),st=getStatus(p.sku);
    const sc=st==='zero'?'stock-zero':st==='low'?'stock-low':'stock-ok';
    const bc=st==='zero'?'badge-zero':st==='low'?'badge-low':'badge-ok';
    const bl=st==='zero'?'缺貨':st==='low'?'偏低':'正常';
    return `<div class="table-row">
      <span class="sku-tag">${p.sku}</span>
      <span style="font-size:13px">${p.name_zh}</span>
      <span>${catBadge(p.category)}</span>
      <span class="sum-val ${sc}" style="font-size:16px">${s}</span>
      <span style="color:var(--text3)">${getMin(p.sku)}</span>
      <span><span class="stock-badge ${bc}">${bl}</span></span>
      <span class="action-btns">
        <button class="act-btn in" onclick="openModalFor('in','${p.sku}')">＋IN</button>
        <button class="act-btn out" onclick="openModalFor('out','${p.sku}')">－OUT</button>
      </span>
    </div>`;
  }).join('');
}

function renderHistory(){
  const rev=[...history].reverse();
  if(!rev.length){document.getElementById('history-body').innerHTML='<div class="empty-row">尚無異動記錄</div>';return;}
  document.getElementById('history-body').innerHTML=rev.slice(0,300).map(h=>{
    const t=h.type==='in'?'<span class="in-tag">▲IN</span>':'<span class="out-tag">▼OUT</span>';
    return `<div class="hist-row">
      <span>${h.date}</span><span style="color:var(--text3)">${h.time}</span>
      <span><span class="sku-tag">${h.sku}</span><br><span style="font-size:11px;color:var(--text3)">${h.name}</span></span>
      <span>${t}</span><span style="font-weight:600">${h.qty}</span><span>${h.after}</span>
      <span style="color:var(--text3);font-size:11px">${h.note||'—'}</span>
    </div>`;
  }).join('');
}
function clearHistory(){if(!confirm('確定清除所有異動記錄？'))return;history=[];saveAll();renderHistory();}

function switchTab(t){
  document.getElementById('view-inv').style.display=t==='inv'?'block':'none';
  document.getElementById('view-hist').style.display=t==='hist'?'block':'none';
  document.getElementById('tab-inv').className='tab-btn'+(t==='inv'?' active':'');
  document.getElementById('tab-hist').className='tab-btn'+(t==='hist'?' active':'');
  if(t==='hist')renderHistory();
}

function openModal(type){
  modalType=type; selectedSku=null;
  document.getElementById('modal-title').textContent=type==='in'?'＋ 入庫 (IN)':'－ 出庫 (OUT)';
  document.getElementById('modal-confirm').textContent=type==='in'?'確認入庫':'確認出庫';
  document.getElementById('modal-confirm').className='btn '+(type==='in'?'btn-green':'btn-red');
  document.getElementById('modal-sku-input').value='';
  document.getElementById('modal-product-info').innerHTML='';
  document.getElementById('modal-qty').value=1;
  document.getElementById('modal-date').value=new Date().toLocaleDateString('en-CA');
  document.getElementById('modal-note').value='';
  document.getElementById('modal-dd').innerHTML='';
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('modal-sku-input').focus(),100);
}
function openModalFor(type,sku){
  openModal(type);
  const p=getProducts().find(p=>p.sku===sku);
  if(p){selectedSku=sku;document.getElementById('modal-sku-input').value=sku;showProductInfo(p);}
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}
function closeModalBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
function showProductInfo(p){
  document.getElementById('modal-product-info').innerHTML=`
    <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:10px 12px">
      <div style="font-weight:700;color:var(--brand)">${p.sku}</div>
      <div style="font-size:14px;font-weight:500;margin-top:2px">${p.name_zh}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">現有庫存: <strong style="color:var(--text)">${getStock(p.sku)}</strong> pcs · 最低庫存: ${getMin(p.sku)} pcs</div>
    </div>`;
}
function buildDdHtml(list){
  if(!list.length)return'<div class="sku-dd-wrap"><div style="padding:10px 12px;font-size:12px;color:var(--text3)">找不到產品</div></div>';
  return'<div class="sku-dd-wrap">'+list.map(p=>`<div class="sku-dd-item"
    onmousedown="selectSku('${p.sku}')" ontouchstart="selectSku('${p.sku}')" onclick="selectSku('${p.sku}')">
    <span style="font-weight:700;color:var(--brand)">${p.sku}</span>
    <span style="margin-left:8px">${p.name_zh}</span>
    <span style="float:right;color:var(--text3)">庫存:${getStock(p.sku)}</span>
  </div>`).join('')+'</div>';
}
function filterModalSku(v){
  const q=v.toLowerCase();
  const m=getProducts().filter(p=>p.sku.toLowerCase().includes(q)||p.name_zh.toLowerCase().includes(q)||p.name_en.toLowerCase().includes(q));
  document.getElementById('modal-dd').innerHTML=buildDdHtml(m.slice(0,20));
  ddVisible=true;
}
function showModalDd(){
  const v=document.getElementById('modal-sku-input').value;
  const m=v?getProducts().filter(p=>p.sku.toLowerCase().includes(v.toLowerCase())||p.name_zh.includes(v)):getProducts().slice(0,20);
  document.getElementById('modal-dd').innerHTML=buildDdHtml(m.slice(0,20));
  ddVisible=true;
}
function hideModalDd(){ddVisible=false;setTimeout(()=>{if(!ddVisible)document.getElementById('modal-dd').innerHTML='';},300);}
function selectSku(sku){
  selectedSku=sku;
  document.getElementById('modal-sku-input').value=sku;
  document.getElementById('modal-dd').innerHTML='';
  const p=getProducts().find(p=>p.sku===sku);
  if(p)showProductInfo(p);
}

function confirmTx(){
  if(!selectedSku){alert('請先選擇產品SKU');return;}
  const qty=parseInt(document.getElementById('modal-qty').value)||0;
  if(qty<=0){alert('請輸入有效數量');return;}
  const date=document.getElementById('modal-date').value;
  const note=document.getElementById('modal-note').value.trim();
  const p=getProducts().find(p=>p.sku===selectedSku);
  const cur=getStock(selectedSku);
  if(modalType==='out'&&qty>cur){if(!confirm(`警告：出庫(${qty})超過庫存(${cur})！確定繼續？`))return;}
  const after=modalType==='in'?cur+qty:Math.max(0,cur-qty);
  stock[selectedSku]=after;
  const now=new Date();
  history.push({date,time:now.toTimeString().slice(0,5),sku:selectedSku,name:p?p.name_zh:selectedSku,type:modalType,qty,after,note});
  saveAll();renderSummary();renderTable();closeModal();
}

function exportCSV(){
  const rows=[['SKU','中文名稱','英文名稱','類別','庫存','最低庫存','狀態']];
  getProducts().forEach(p=>{
    const s=getStock(p.sku),st=getStatus(p.sku);
    rows.push([p.sku,p.name_zh,p.name_en,p.category,s,getMin(p.sku),st==='zero'?'缺貨':st==='low'?'偏低':'正常']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='bowen_inventory_'+new Date().toLocaleDateString('en-CA')+'.csv';a.click();
}

renderSummary();renderTable();
</script>
</body>
</html>
